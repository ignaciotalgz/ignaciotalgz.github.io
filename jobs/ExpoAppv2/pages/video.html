<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="../css/video.css">
    <title>Video</title>

    <!-- PWA: misma manifest/iconos que index.html, rutas relativas a esta carpeta -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#1a2351">
    <link rel="icon" href="../icons/icon-192.png">
    <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
    <video id="videoPlayer" autoplay loop></video>

    <button id="botonSilenciar"><img src="../img/volume-3.svg" alt=""></button>
    <button id="botonRegresar"><img src="../img/x.svg" alt=""></button>

    <script src="../js/video.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // scope '../' para que controle toda la app (root), no solo /pages/
          navigator.serviceWorker.register('../sw.js', { scope: '../' })
            .then((reg) => console.log('[SW] registrado, scope:', reg.scope))
            .catch((err) => console.error('[SW] error al registrar:', err));
        });
      }
    </script>

</body>

</html>
